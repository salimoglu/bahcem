<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#2e7d32"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Bahçem"/>
  <title>Bahçem · Bitki ve sulama takibi</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"/>
  <link rel="stylesheet" href="bahcem.css?v=20260511b"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="plants_db.js"></script>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner"></div>
    <span>Yükleniyor…</span>
  </div>

  <div id="login-screen" style="display:none">
    <img class="login-logo" src="icons/logo-header.png" alt="Bahçem"/>
    <h1>🌿 Bahçem</h1>
    <p class="tagline">Bitkilerini takip et, bakımlarını hiç unutma</p>
    <button id="btn-google-login" type="button">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Google ile giriş yap
    </button>
    <p id="login-error"></p>
  </div>

  <div id="app-screen" style="display:none">

    <div class="top-bar">
      <div class="theme-btns">
        <button class="theme-btn active" data-t="light" title="Açık"  aria-label="Açık tema"></button>
        <button class="theme-btn"        data-t="dark"  title="Koyu"  aria-label="Koyu tema"></button>
        <button class="theme-btn"        data-t="blue"  title="Mavi"  aria-label="Mavi tema"></button>
      </div>
      <div class="user-info">
        <img id="user-photo" src="" alt=""/>
        <span id="user-name"></span>
        <button type="button" id="btn-logout">Çıkış</button>
      </div>
    </div>

    <!-- BAHÇELER -->
    <div id="screen-gardens" class="screen active">
      <div class="wrap">
        <header class="app-header">
          <img src="icons/logo-header.png" width="52" height="52" alt="Bahçem"/>
          <div class="title-block">
            <h1>Bahçem</h1>
            <p>Bahçelerini yönet</p>
          </div>
          <button type="button" id="btn-add-garden" class="btn btn-primary btn-sm">+ Bahçe ekle</button>
        </header>
        <div id="gardens-empty" class="empty hidden">
          <div class="empty-icon">🌱</div>
          <h2>Henüz bahçe yok</h2>
          <p>İlk bahçeni ekleyerek bitkilerini takip etmeye başla.</p>
          <button type="button" class="btn btn-primary btn-block" id="btn-add-garden-empty">+ Bahçe ekle</button>
        </div>
        <div id="garden-list" class="garden-grid"></div>
      </div>
    </div>

    <!-- BAHÇENİN İÇİ -->
    <div id="screen-plants" class="screen">
      <div class="wrap">
        <div class="plants-header">
          <button type="button" id="btn-back" class="btn-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Bahçeler
          </button>
          <div class="garden-title-wrap">
            <h2 id="garden-title-display" class="garden-title-text"></h2>
            <button type="button" id="btn-rename-garden" class="btn-icon" title="Adı değiştir">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
          <button type="button" id="btn-add-plant" class="btn btn-primary btn-sm">+ Bitki ekle</button>
        </div>
        <div id="plants-empty" class="empty hidden">
          <div class="empty-icon">🪴</div>
          <h2>Bu bahçede bitki yok</h2>
          <p>İlk bitkini ekle, sulama takibine başla!</p>
          <button type="button" class="btn btn-primary btn-block" id="btn-add-plant-empty">+ Bitki ekle</button>
        </div>
        <div id="plant-list" class="plant-grid"></div>
      </div>
    </div>

  </div>

  <!-- MODAL: BAHÇE -->
  <div id="modal-garden" class="modal-backdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <h2 id="modal-garden-title">Yeni bahçe</h2>
      <div class="field">
        <label for="field-garden-name">Bahçe adı <span style="font-weight:400;color:var(--muted)">(boş bırakırsan otomatik verilir)</span></label>
        <input type="text" id="field-garden-name" placeholder="örn. Balkonum, 1. Bahçem…" maxlength="40"/>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost"   id="modal-garden-close">Vazgeç</button>
        <button type="button" class="btn btn-primary" id="btn-save-garden">Kaydet</button>
      </div>
    </div>
  </div>

  <!-- MODAL: BİTKİ EKLE -->
  <div id="modal-add-plant" class="modal-backdrop" role="dialog" aria-modal="true">
    <div class="modal modal-wide">
      <h2>Bitki ekle</h2>
      <input type="text" id="field-plant-search" class="plant-search-input" autocomplete="off" placeholder="🔍 Bitki adı ile filtrele… (Monstera, Gül, Domates…)"/>
      <div id="plant-search-results" class="plant-search-grid"></div>
      <div id="plant-preview-card" class="plant-preview-card hidden">
        <div class="ppc-img-wrap">
          <span id="ppc-emoji" class="ppc-emoji-fallback"></span>
          <img id="ppc-img" src="" alt="" style="display:none"/>
        </div>
        <div class="ppc-info">
          <div class="ppc-names">
            <span id="ppc-name-tr"  class="ppc-name-tr"></span>
            <span id="ppc-name-lat" class="ppc-name-lat"></span>
          </div>
          <p id="ppc-excerpt" class="ppc-excerpt"></p>
          <div class="ppc-badges">
            <span id="ppc-light"      class="ppc-badge ppc-badge-light"></span>
            <span id="ppc-water-freq" class="ppc-badge ppc-badge-water"></span>
          </div>
          <div class="ppc-watering-row">
            <label>Sulama:</label>
            <div class="ppc-watering-ctrl">
              <button type="button" class="ppc-step" id="ppc-step-down">−</button>
              <span id="ppc-interval-val">7</span>
              <span class="ppc-day-label">gün</span>
              <button type="button" class="ppc-step" id="ppc-step-up">+</button>
            </div>
          </div>
        </div>
      </div>
      <div id="plant-add-status" class="plant-add-status"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost"   id="modal-plant-close">Vazgeç</button>
        <button type="button" class="btn btn-primary" id="btn-save-plant" disabled>Bahçeye ekle</button>
      </div>
    </div>
  </div>

  <!-- MODAL: BİTKİ DETAY -->
  <div id="modal-plant-detail" class="modal-backdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <div id="plant-detail-content"></div>
      <div class="modal-actions" style="margin-top:12px">
        <button type="button" class="btn btn-ghost" id="modal-detail-close">Kapat</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="bahcem.js?v=20260511b" defer></script>
</body>
</html>
